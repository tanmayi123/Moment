server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|svg|jpg|jpeg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }
}
