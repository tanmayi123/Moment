name: Deploy FastAPI to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'api_requirements.txt'
      - 'Dockerfile.api'
      - '.github/workflows/deploy-api.yml'

env:
  PROJECT_ID: moment-486719
  SERVICE:    momento-api
  REGION:     us-central1
  IMAGE:      us-central1-docker.pkg.dev/moment-486719/momento-api/momento-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -f Dockerfile.api \
            -t $IMAGE:$GITHUB_SHA \
            -t $IMAGE:latest .
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          cat > /tmp/envvars.yaml <<EOF
          INSTANCE_CONNECTION_NAME: "moment-486719:us-central1:moment-db"
          DB_NAME: "momento"
          DB_USER: "momento_admin"
          DB_PASS: "${{ secrets.DB_PASS }}"
          FIREBASE_PROJECT_ID: "momento-504b2"
          BQ_PROJECT: "moment-486719"
          BQ_DATASET: "new_moments_processed"
          BQ_TABLE_COMPAT: "compatibility_results"
          BQ_TABLE_USERS: "users_processed"
          EOF
          gcloud run deploy $SERVICE \
            --image $IMAGE:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --project $PROJECT_ID \
            --env-vars-file /tmp/envvars.yaml \
            --quiet
