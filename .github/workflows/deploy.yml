name: Deploy Pipeline to Cloud Run

on:
  push:
    branches: [fastapi-pipeline]
    paths:
      - "fastapi_pipeline/**"

env:
  PROJECT_ID: moment-486719
  SERVICE:    moment-pipeline
  REGION:     us-central1
  IMAGE:      us-central1-docker.pkg.dev/moment-486719/momento-api/moment-pipeline

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: fastapi_pipeline
        run: |
          docker build --platform linux/amd64 \
            -t $IMAGE:$GITHUB_SHA \
            -t $IMAGE:latest .
          docker push $IMAGE:$GITHUB_SHA
          docker push $IMAGE:latest

      - name: Deploy to Cloud Run
        run: |
          cat > /tmp/envvars.yaml <<EOF
          INSTANCE_CONNECTION_NAME: "moment-486719:us-central1:moment-db"
          CLOUDSQL_USER: "momento_admin"
          CLOUDSQL_PASS: "${{ secrets.CLOUDSQL_PASS }}"
          CLOUDSQL_DB: "momento"
          GOOGLE_CLOUD_PROJECT: "moment-486719"
          BQ_DATASET: "new_moments_processed"
          MOMENT_GCP_PROJECTID: "moment-486719"
          GEMINI_API_KEY_MOMENT: "${{ secrets.GEMINI_API_KEY_MOMENT }}"
          EOF
          gcloud run deploy $SERVICE \
            --image $IMAGE:latest \
            --region $REGION \
            --platform managed \
            --allow-unauthenticated \
            --project $PROJECT_ID \
            --service-account 329431711809-compute@developer.gserviceaccount.com \
            --vpc-connector=momento-connector \
            --vpc-egress=private-ranges-only \
            --env-vars-file /tmp/envvars.yaml \
            --quiet